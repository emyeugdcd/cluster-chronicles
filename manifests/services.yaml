apiVersion: v1
kind: Service
metadata:
  name: vitals-backend-service
  namespace: vitals-app
spec:
  selector:
    app: vitals-backend
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: vitals-frontend-service
  namespace: vitals-app
spec:
  selector:
    app: vitals-frontend
  ports:
  - name: http
    protocol: TCP
    port: 3000
    targetPort: 3000
